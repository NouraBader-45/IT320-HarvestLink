<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HarvestLink | Register</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-wrap">
      <div class="logo-area">
        <img src="../assets/images/logo.png" alt="HarvestLink Logo" />
        <div class="logo-text">
          <h1>HarvestLink</h1>
          <p>Create your account</p>
        </div>
      </div>

      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="login.html">Login</a>
        <a class="active" href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <h2>Register</h2>
      <p>Create an account as a Farmer or a Charitable Organization.</p>
    </div>
  </section>

  <section>
    <div class="form-wrap">
      <h3>Create Account</h3>
      <p class="subtext">Complete the form below to join HarvestLink.</p>

      <form>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter username" />
        </div>

        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input id="reg-email" type="email" placeholder="Enter email address" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input id="reg-password" type="password" placeholder="Enter password" />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input id="confirm-password" type="password" placeholder="Confirm password" />
          </div>
        </div>

        <div class="form-group">
          <label for="role">Role Selection</label>
          <select id="role">
            <option selected disabled>Select role</option>
            <option>Farmer</option>
            <option>Charity</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Create Account</button>
          <a href="login.html" class="btn btn-outline">Back to Login</a>
        </div>
      </form>
    </div>
  </section>

  <footer class="main-footer">
    <div class="container footer-wrap">
      <p>HarvestLink Web Platform</p>
      <p>IT320 Practical Software Engineering — <span class="current-year"></span></p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
