<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HarvestLink | Manage Profile</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-wrap">
      <a class="logo-area" href="../index.html" aria-label="Go to Home">
        <img src="../assets/images/logo.png" alt="HarvestLink Logo" />
        <div class="logo-text">
          <h1>HarvestLink</h1>
          <p>A digital bridge between surplus and need</p>
        </div>
      </a>

      <div class="header-utilities">
        <a href="manage-profile.html" class="profile-link" title="Profile">
          <img src="../assets/images/logo.png" alt="Profile" />
        </a>

        <div class="menu-wrap">
          <button class="hamburger-btn" data-target="profileMenu" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="dropdown-menu" id="profileMenu">
            <a href="farmer-home.html">Home</a>
            <a href="manage-profile.html">Edit Profile</a>
            <a href="login.html" class="logout-btn">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <h2>Manage Profile</h2>
      <p>Update your personal information and profile image.</p>
    </div>
  </section>

  <section>
    <div class="form-wrap">
      <h3>Profile Information</h3>
      <p class="subtext">Keep your account information accurate and up to date.</p>

      <form id="profile-form">
        <div class="form-group">
          <label for="full-name">Full Name</label>
          <input id="full-name" type="text" placeholder="Enter full name" />
        </div>

        <div class="form-group">
          <label for="profile-email">Email Address</label>
          <input id="profile-email" type="email" placeholder="Enter email address" />
        </div>

        <div class="form-group">
          <label for="phone">Contact Number</label>
          <input id="phone" type="text" placeholder="Enter contact number" />
        </div>

        <div class="form-group">
          <label for="image">Profile Image</label>
          <input id="image" type="file" />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="farmer-home.html" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </section>

  <footer class="main-footer">
    <div class="container footer-wrap">
      <p>HarvestLink Web Platform</p>
      <p>IT320 Practical Software Engineering — <span class="current-year"></span></p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
